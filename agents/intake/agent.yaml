role: intake

summary: >
  Clarify user app requests through multi-turn conversation until the requirement is
  unambiguous. Produce a locked, structured AppSpec and signal the gateway to trigger
  the build pipeline.

replaces: designer

behaviour:
  - Hold multi-turn conversation; ask at most one clarifying question per turn
  - Once the spec is unambiguous, produce it immediately — do not over-clarify
  - Prefer simple, minimal interpretations of ambiguous requirements
  - Prompt with an explicit app type menu if the description matches multiple types
  - Do not suggest implementation details unless explicitly asked
  - Use LLMRouter with ModelTier.STANDARD

spec_readiness_criteria:
  - App type is clear: form, dashboard, workflow, connector, or assistant
  - Primary purpose is unambiguous in one sentence
  - At least three discrete requirements are known
  - Stack can be defaulted to python-fastapi if not specified

output:
  schema: agentic_standards.contracts.agent_io.AppSpec
  required_fields:
    - name           # kebab-case, ≤40 chars
    - description    # one sentence
    - app_type       # one of: form, dashboard, workflow, connector, assistant
    - stack          # default: python-fastapi
    - tenant_id      # propagated from the gateway; never inferred
    - requirements   # list of ≥3 discrete user-facing requirements
  optional_fields:
    - acceptance_criteria
    - data_model

response_when_locked:
  - Return AgentResponse with status="ready" and spec in outputs
  - Include spec_locked=true in response body
  - Do not trigger the build — that is the gateway's responsibility

do_not:
  - Start implementation (builder's job)
  - Ask for user confirmation after spec is locked
  - Call the planner or builder directly
  - Access Postgres directly (route through the gateway)
  - Ask more than one question per conversation turn

endpoint: POST /intake
config:
  - INTAKE_LLM_MODEL      # model name; provider default if unset
  - INTAKE_LLM_API_KEY    # required when provider ≠ ollama
  - OLLAMA_URL            # http://ollama:11434
  - DATABASE_URL          # asyncpg DSN for message history
  - STANDARDS_PATH        # /standards

testing:
  primary_signal: spec lock rate on unambiguous inputs (target 100%)
  secondary_signal: clarifying question count on vague inputs (target ≤3 turns to lock)

  contract:
    - mock LLM returns question text → spec_locked=false, reply is non-empty string
    - mock LLM returns valid spec JSON with all required fields → spec_locked=true, AppSpec validates
    - mock LLM returns malformed JSON → falls back to clarifying question, no 500
    - mock LLM returns empty string → retries once; returns generic clarifying question on second failure
    - message with missing tenant_id → 422 validation error, not propagated as inferred value

  behavioral:
    - "build me an app" → spec_locked=false (premature lock prevention)
    - "I need a form to collect employee feedback with name, department, and comment fields" → spec_locked=true, app_type=form
    - "I need a dashboard" → spec_locked=false, reply asks what data to display
    - "build a workflow tracker for contract approvals with three stages" → spec_locked=true, app_type=workflow
    - 5-turn multi-turn fixture (starts vague, answers all questions) → spec_locked=true by turn 5
    - description matching both form and workflow → reply contains explicit app type menu

  quality:
    - criterion: clarifying question is specific, targets a single unknown, does not repeat prior questions
      score_range: 0–1
    - criterion: locked spec requirements are discrete and actionable (not vague like "it should work well")
      score_range: 0–1
    - criterion: app_type classification matches human judgment for 10 representative descriptions
      score_range: 0–1

  fixtures: tests/agents/intake/fixtures/
