name: platform

services:

  traefik:
    image: traefik:v3.2
    command:
      - "--log.level=WARN"
      - "--entrypoints.web.address=:80"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=platform_platform"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - platform

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - platform

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - platform

  gitea:
    image: gitea/gitea:latest
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__DOMAIN: ${DS1_HOST:-localhost}
      GITEA__server__ROOT_URL: "http://${DS1_HOST:-localhost}:3000/"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__webhook__ALLOWED_HOST_LIST: "*"
    volumes:
      - gitea_data:/data
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/api/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - platform

  gitea-init:
    image: gitea/gitea:latest
    user: "1000:1000"
    volumes:
      - gitea_data:/data
    environment:
      GITEA_WORK_DIR: /data
      GITEA_CUSTOM: /data/gitea
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__security__INSTALL_LOCK: "true"
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-platform}
      GITEA_ADMIN_PASS: ${GITEA_ADMIN_PASS}
      GITEA_ADMIN_EMAIL: ${GITEA_ADMIN_EMAIL:-admin@platform.local}
    command:
      - sh
      - -c
      - "gitea admin user create --admin --username $$GITEA_ADMIN_USER --password $$GITEA_ADMIN_PASS --email $$GITEA_ADMIN_EMAIL --must-change-password=false || echo 'Admin user already exists, skipping'"
    depends_on:
      gitea:
        condition: service_healthy
    restart: "no"
    networks:
      - platform

  woodpecker-server:
    image: woodpeckerci/woodpecker-server:v3
    extra_hosts:
      - "${DS1_HOST:-localhost}:host-gateway"
    environment:
      WOODPECKER_OPEN: "false"
      WOODPECKER_ADMIN: ${GITEA_ADMIN_USER:-platform}
      WOODPECKER_GITEA: "true"
      WOODPECKER_GITEA_URL: "http://${DS1_HOST:-localhost}:3000"
      WOODPECKER_GITEA_CLIENT: ${WOODPECKER_GITEA_CLIENT:-}
      WOODPECKER_GITEA_SECRET: ${WOODPECKER_GITEA_SECRET:-}
      WOODPECKER_AGENT_SECRET: ${WOODPECKER_AGENT_SECRET:-changeme}
      WOODPECKER_HOST: "http://${DS1_HOST:-localhost}:8080"
      WOODPECKER_DATABASE_DRIVER: postgres
      WOODPECKER_DATABASE_DATASOURCE: "postgres://platform:${POSTGRES_PASSWORD:-changeme}@postgres:5432/platform?sslmode=disable"
      WOODPECKER_ENVIRONMENT: "DS1_HOST,APP_DOMAIN"
      DS1_HOST: ${DS1_HOST:-localhost}
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "8080:8000"
    depends_on:
      gitea:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - platform

  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:v3
    environment:
      WOODPECKER_SERVER: woodpecker-server:9000
      WOODPECKER_AGENT_SECRET: ${WOODPECKER_AGENT_SECRET:-changeme}
      WOODPECKER_BACKEND: docker
      DOCKER_HOST: unix:///var/run/docker.sock
      WOODPECKER_BACKEND_DOCKER_VOLUMES: "/var/run/docker.sock:/var/run/docker.sock"
      WOODPECKER_BACKEND_DOCKER_NETWORK: platform_platform
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - woodpecker-server
    restart: unless-stopped
    networks:
      - platform

  intake:
    build:
      context: ./agents
      dockerfile: intake/Dockerfile
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      MODEL_FAST: ${MODEL_FAST:-ollama/llama3.1:8b}
      MODEL_STANDARD: ${MODEL_STANDARD:-ollama/llama3.1:8b}
      MODEL_STRONG: ${MODEL_STRONG:-ollama/llama3.1:8b}
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - platform

  gateway:
    build: ./gateway
    environment:
      GITEA_URL: http://gitea:3000
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-platform}
      GITEA_ADMIN_PASS: ${GITEA_ADMIN_PASS}
      DB_URL: postgresql://platform:${POSTGRES_PASSWORD:-changeme}@postgres:5432/platform
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      JWT_SECRET: ${JWT_SECRET:-changeme-set-in-env}
      INVITE_CODE: ${INVITE_CODE:-}
      INTAKE_URL: http://intake:8001
    depends_on:
      postgres:
        condition: service_healthy
      gitea-init:
        condition: service_completed_successfully
      intake:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=Host(`api.${APP_DOMAIN:-localhost}`) || Path(`/auth/login`) || Path(`/auth/register-web`) || PathPrefix(`/chat`) || PathPrefix(`/me`) || PathPrefix(`/register`) || PathPrefix(`/verify`) || PathPrefix(`/apps`) || PathPrefix(`/runs`) || PathPrefix(`/health`)"
      - "traefik.http.routers.gateway.entrypoints=web"
      - "traefik.http.services.gateway.loadbalancer.server.port=8000"
    networks:
      - platform

  portal:
    build:
      context: ./portal
      args:
        NEXT_PUBLIC_SERVER_URL: ""
    environment:
      GATEWAY_URL: http://gateway:8000
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3032 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal.rule=PathPrefix(`/`)"
      - "traefik.http.routers.portal.entrypoints=web"
      - "traefik.http.services.portal.loadbalancer.server.port=3032"
    networks:
      - platform

  loki:
    build: ./infra/loki
    volumes:
      - loki_data:/tmp/loki
    networks:
      - platform

  promtail:
    build: ./infra/promtail
    environment:
      PROMTAIL_HOSTNAME: ${HOSTNAME:-ds1}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/snap/docker/common/var-lib-docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks:
      - platform

  grafana:
    build: ./infra/grafana
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${APP_DOMAIN:-localhost}`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    networks:
      - platform

networks:
  platform:
    driver: bridge

volumes:
  db_data:
  ollama_data:
  gitea_data:
  loki_data:
  grafana_data:

