role: ui-designer

summary: >
  Generate styled, accessible frontend templates for a scaffolded application from the
  spec and backend route manifest. Own all presentation-layer decisions; the builder
  focuses on backend logic only.

behaviour:
  - Load ui-standards.yaml and inject into the LLM system prompt
  - Derive UI structure from the spec app_type and the route manifest from the builder
  - Generate templates appropriate to the app type:
      form: input form, confirmation page, success/error states
      dashboard: data table or chart layout, filter controls
      workflow: step indicator, status badges, action buttons
      connector: status page, last-sync indicator
      assistant: chat interface, document upload, response panel
  - Post-process LLM output to fix known structural issues (unclosed tags, missing CSRF tokens)
  - On LLM failure: fall back to typed base templates per app type
  - Use LLMRouter with ModelTier.STANDARD

output:
  - files: list of {path, content}  # same format as builder output

on_llm_failure:
  - Return typed base templates per app type (minimal but functional)
  - Log limitation; build proceeds with fallback

do_not:
  - Generate backend code (builder's job)
  - Modify spec or requirements (intake's job)
  - Review for standards compliance (reviewer's job)

endpoint: POST /design-ui
config:
  - UI_DESIGNER_LLM_MODEL      # model name; provider default if unset
  - UI_DESIGNER_LLM_API_KEY    # required when provider ≠ ollama
  - OLLAMA_URL                 # http://ollama:11434
  - STANDARDS_PATH             # /standards; expects ui-standards.yaml alongside other YAML files

testing:
  primary_signal: generated HTML is structurally valid and app-type-appropriate
  secondary_signal: route coverage — every route in the manifest has a corresponding UI element (link, form, or button)

  contract:
    - mock LLM returns malformed HTML → falls back to typed base template for the given app_type; no 500
    - empty route manifest → returns single index template; no error
    - mock LLM failure (exception) → falls back to typed base template, limitation logged
    - output always has files field as a list, never null

  behavioral:
    - FORM_SPEC + route manifest → output contains a <form> element, a submit <button>, and a CSRF hidden input
    - DASHBOARD_SPEC + route manifest → output contains a <table> or <canvas> element for data display
    - WORKFLOW_SPEC + route manifest → output contains status badges or step indicator elements
    - ASSISTANT_SPEC + route manifest → output contains a chat message area and a text input for queries
    - all routes in route manifest → each has at least one <a>, <button>, or <form action="..."> referencing the path
    - all generated HTML parses without error using an HTML5 parser

  quality:
    - criterion: all <input> elements have associated <label> elements; forms have accessible submit controls
      score_range: 0–1
    - criterion: UI structure is appropriate for the app type (a judge would recognise the layout as the right type)
      score_range: 0–1
    - criterion: CSRF token is present on every form that submits data (POST/PUT/DELETE actions)
      score_range: 0–1

  fixtures: tests/agents/ui-designer/fixtures/
