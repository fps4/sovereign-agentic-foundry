role: reviewer

summary: >
  Standards quality gate. Check all generated files — backend code from the builder
  and frontend templates from the ui-designer — against the platform standards YAML
  files before any commit to Gitea. Return either a pass (proceed to publisher) or
  structured fix instructions (return to builder for correction).

behaviour:
  - Run static checks from naming.yaml, security.yaml, patterns.yaml, and ui-standards.yaml
  - Run LLM-assisted semantic review for issues not catchable by static rules
  - Return structured fix instructions: {file, issue, fix_instruction}
  - On LLM returning unparseable verdict: treat as pass with warning log (avoid blocking on reviewer instability)
  - Use LLMRouter with ModelTier.STANDARD

verdict:
  passed:
    - Return GateResult(gate="reviewer", verdict="approved")
    - Gateway proceeds to publisher
  blocked:
    - Return GateResult(gate="reviewer", verdict="blocked", reasons=[...])
    - Each reason must be {file, issue, fix_instruction}
    - Gateway sends fix_instructions to builder; calls reviewer again on updated files
    - Bounded by MAX_REVIEWER_RETRIES in the gateway

static_checks:
  - naming.yaml: service names, env var format, DB object casing
  - security.yaml: base image pinning, non-root Dockerfile user, no hardcoded secrets, required Docker labels
  - patterns.yaml: health endpoint present, structured JSON logging, graceful shutdown

do_not:
  - Generate code (builder's job)
  - Run pytest (CI's job)
  - Commit to Gitea (publisher's job)
  - Block the pipeline on LLM reviewer instability (static checks are authoritative; LLM review is advisory)

endpoint: POST /review
config:
  - REVIEWER_LLM_MODEL      # model name; provider default if unset
  - REVIEWER_LLM_API_KEY    # required when provider ≠ ollama
  - OLLAMA_URL              # http://ollama:11434
  - STANDARDS_PATH          # /standards; reviewer loads all YAML files at startup

testing:
  primary_signal: known-violation catch rate — planted violations are caught (target 100% for static rules)
  secondary_signal: false positive rate — clean REFERENCE_FILES pass without spurious blocks (target 0%)

  contract:
    - REFERENCE_FILES (known-good build) → verdict=approved
    - file containing FROM python:3.12 without digest → verdict=blocked, security.yaml rule cited
    - file containing SECRET_KEY = "hardcoded" → verdict=blocked, fix_instruction references that file
    - file named myRoutes.py (camelCase) → verdict=blocked, naming.yaml rule cited
    - mock LLM returns unparseable verdict → treated as pass, warning logged, no 500

  behavioral:
    - Dockerfile with USER root → verdict=blocked, fix_instruction says to add non-root user
    - Python file with f"SELECT * FROM {table}" → verdict=blocked, security rule cited
    - file missing GET /health endpoint → verdict=blocked, patterns.yaml rule cited
    - REFERENCE_FILES run 5 times → verdict=approved all 5 times (consistency check)
    - VIOLATION_FILES set (10 files, each with one planted violation) → each file blocked with correct rule

  quality:
    - criterion: fix instructions reference a specific file, describe the exact issue, and give an actionable fix
      score_range: 0–1
    - criterion: verdict consistency — same file submitted 5× receives the same verdict each time
      score_range: 0–1  # measured as fraction of consistent results
    - criterion: LLM semantic review catches logic-level issues that static rules cannot (e.g. SQL injection via ORM misuse)
      score_range: 0–1

  fixtures: tests/agents/reviewer/fixtures/
