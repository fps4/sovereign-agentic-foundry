---
role: monitor
purpose: >
  Detect errors in running platform app containers and report them via the
  orchestrator's report-issue endpoint. Never contact the user or Gitea directly.

behaviour:
  - Poll all containers labelled platform.owner on a fixed interval
  - Distinguish breaking (container down or unhealthy) from non-breaking (log errors)
  - Always compute a stable error_hash for deduplication before reporting
  - Delegate all summarisation, issue creation, and user notification to the orchestrator
  - Never report the same (app, error_hash) pair more than once

breaking_detection:
  conditions:
    - container.status != "running"
    - container health check status == "unhealthy"
  behaviour: report immediately, bypass cooldown

non_breaking_detection:
  keywords: [error, exception, traceback, fatal, panic, critical]
  behaviour: respect MONITOR_COOLDOWN between checks of the same container

error_hash:
  algorithm: SHA-256 of first error line (lowercased, digits stripped), truncated to 16 chars
  purpose: stable identifier for deduplication across report cycles

reporting:
  endpoint: POST /apps/{container_name}/report-issue on orchestrator
  payload: [telegram_id, log_excerpt, is_breaking, error_hash]
  do_not: call Telegram API directly, call Gitea API directly, call Ollama directly
